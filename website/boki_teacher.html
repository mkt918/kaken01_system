<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簿記 教員用ガイド - 学習ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/app.js" defer></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        pre { color: #e2e8f0; }
        pre code { background-color: transparent !important; color: inherit !important; padding: 0 !important; }
    </style>
</head>
<body class="text-gray-800 antialiased flex h-screen overflow-hidden">

    <!-- サイドバー -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shadow-sm z-10 hidden md:flex">
        <div class="p-6 border-b border-slate-100">
            <h2 class="text-xl font-bold tracking-tight text-emerald-700 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                簿記 教員モード
            </h2>
            <a href="boki.html" class="text-xs text-slate-500 hover:text-slate-800 mt-2 inline-block">← 簿記トップへ戻る</a>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="nav-syllabus">
            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 mt-4">基礎編: 簿記の基本</div>
            <a href="?week=14boki/week01" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-600" data-week="14boki/week01">W1: 簿記とは何か</a>
            <a href="?week=14boki/week02" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-600" data-week="14boki/week02">W2: 財務諸表を読もう</a>

            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 mt-8">5要素編: 簿記の分類</div>
            <a href="?week=14boki/week03" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-600" data-week="14boki/week03">W3: 5要素① 資産・負債・純資産</a>
            <a href="?week=14boki/week04" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-600" data-week="14boki/week04">W4: 5要素② 収益・費用と仕訳</a>

            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 mt-8">現金・預金編: 資金の取引</div>
            <a href="?week=14boki/week05" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-600" data-week="14boki/week05">W5: 現金の取引・現金過不足</a>
            <a href="?week=14boki/week06" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-600" data-week="14boki/week06">W6: 普通預金・定期預金・当座預金</a>
            <a href="?week=14boki/week07" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-600" data-week="14boki/week07">W7: 小口現金</a>
            <a href="?week=14boki/week08" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-600" data-week="14boki/week08">W8: 現金・預金 総合演習</a>
        </nav>

        <div class="p-4 border-t border-slate-100 flex items-center bg-slate-50">
            <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold text-sm">師</div>
            <span class="ml-3 text-sm font-medium text-slate-700">教員</span>
        </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 bg-slate-50 overflow-y-auto w-full">
        <div class="md:hidden bg-white border-b border-slate-200 p-4 flex items-center justify-between sticky top-0 z-10">
            <h2 class="text-lg font-bold text-emerald-700">簿記 教員モード</h2>
        </div>

        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <article
                id="markdown-content"
                class="prose prose-slate prose-lg max-w-none
                       prose-headings:font-bold prose-headings:text-slate-800
                       prose-h1:text-3xl prose-h2:text-2xl prose-h2:border-b prose-h2:border-slate-200 prose-h2:pb-2 prose-h2:mt-8
                       prose-h3:text-xl prose-h3:text-slate-700
                       prose-p:text-slate-600 prose-p:leading-relaxed
                       prose-strong:text-slate-800
                       prose-code:bg-slate-100 prose-code:text-emerald-700 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:font-mono prose-code:text-sm
                       prose-pre:bg-slate-800 prose-pre:rounded-xl prose-pre:shadow-lg
                       prose-table:text-sm prose-th:bg-slate-100 prose-th:font-semibold prose-td:border prose-td:border-slate-200
                       prose-blockquote:border-l-emerald-400 prose-blockquote:bg-emerald-50 prose-blockquote:py-1 prose-blockquote:not-italic
                       prose-ul:text-slate-600
                       bg-white rounded-2xl shadow-sm border border-slate-100 p-8 md:p-10
                ">
                <div class="text-center py-12">
                    <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-8 h-8 text-emerald-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    </div>
                    <h1 class="text-3xl font-extrabold text-slate-800 mb-3">簿記 教員用ガイド</h1>
                    <p class="text-slate-500 text-lg">左のメニューから各週のガイドを選んでください。</p>
                </div>
            </article>
        </div>
    </main>

    <script>
        function getCurrentWeek() {
            const params = new URLSearchParams(window.location.search);
            return params.get('week');
        }

        function loadBokiTeacherContent() {
            const week = getCurrentWeek();
            if (!week) return;

            const url = `content/${week}/teacher.md`;
            loadMarkdown(url, 'markdown-content');

            document.querySelectorAll('.week-link').forEach(link => {
                if (link.dataset.week === week) {
                    link.classList.add('bg-emerald-50', 'text-emerald-700', 'font-semibold');
                    link.classList.remove('text-slate-600');
                } else {
                    link.classList.remove('bg-emerald-50', 'text-emerald-700', 'font-semibold');
                    link.classList.add('text-slate-600');
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadBokiTeacherContent);
    </script>
</body>
</html>
