<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生徒用教材 - 学習ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Typography Plugin for Markdown Styling -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/app.js" defer></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800 antialiased flex h-screen overflow-hidden">

    <!-- サイドバー -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shadow-sm z-10 hidden md:flex">
        <div class="p-6 border-b border-slate-100">
            <h2 class="text-xl font-bold tracking-tight text-blue-600 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                生徒用モード
            </h2>
            <a href="index.html" class="text-xs text-slate-500 hover:text-slate-800 mt-2 inline-block">← トップへ戻る</a>
        </div>
        
        <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="nav-syllabus">
            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 mt-4">Step 1: Python基礎</div>
            <a href="?week=week01" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-blue-50 hover:text-blue-600" data-week="week01">W1: 変数とデータ型</a>
            <a href="?week=week03" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-blue-50 hover:text-blue-600" data-week="week03">W3: 条件分岐とインデント</a>
            
            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 mt-6">Step 2: SQL基礎</div>
            <a href="?week=week09" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-blue-50 hover:text-blue-600" data-week="week09">W9: 全てのデータを表示</a>
        </nav>
        
        <div class="p-4 border-t border-slate-100 flex items-center bg-slate-50">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-sm">生</div>
            <span class="ml-3 text-sm font-medium text-slate-700">受講生</span>
        </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 bg-slate-50 overflow-y-auto w-full">
        <!-- スマホ用ヘッダー -->
        <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center md:hidden sticky top-0 z-20">
            <h1 class="font-bold text-blue-600">生徒用教材</h1>
            <a href="index.html" class="text-sm text-slate-500">トップへ</a>
        </header>

        <div class="max-w-4xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
            <div class="bg-white shadow-sm ring-1 ring-slate-200 sm:rounded-xl px-6 py-8 sm:p-10">
                <!-- ここにMarkdownがレンダリングされる -->
                <article id="content-area" class="prose prose-slate prose-blue max-w-none 
                    prose-headings:font-bold prose-headings:tracking-tight 
                    prose-h1:text-3xl prose-h2:text-2xl prose-h2:border-b-2 prose-h2:border-slate-100 prose-h2:pb-2 prose-h2:mt-10
                    prose-a:text-blue-600 prose-a:no-underline hover:prose-a:underline
                    prose-pre:bg-slate-800 prose-pre:rounded-lg prose-pre:shadow-sm
                    prose-code:text-blue-600 prose-code:bg-blue-50 prose-code:px-1 prose-code:rounded
                    prose-blockquote:border-l-4 prose-blockquote:border-blue-400 prose-blockquote:bg-blue-50/50 prose-blockquote:py-1 prose-blockquote:px-4 prose-blockquote:font-normal prose-blockquote:not-italic
                ">
                    <!-- レンダリング先 -->
                </article>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const week = getCurrentWeek();
            // Markdownの読み込み
            loadMarkdown(`content/student/${week}.md`, 'content-area');

            // アクティブなリンクのスタイリング
            document.querySelectorAll('.week-link').forEach(link => {
                if(link.getAttribute('data-week') === week) {
                    link.classList.add('bg-blue-50', 'text-blue-700', 'font-semibold');
                    link.classList.remove('text-slate-600');
                }
            });
        });
    </script>
</body>
</html>
