<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教員用ガイド - 学習ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/app.js" defer></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #ecfdf5; }
        ::-webkit-scrollbar-thumb { background: #a7f3d0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6ee7b7; }
    </style>
</head>
<body class="text-gray-800 antialiased flex h-screen overflow-hidden">

    <!-- サイドバー -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shadow-sm z-10 hidden md:flex">
        <div class="p-6 border-b border-emerald-100 bg-emerald-50">
            <h2 class="text-xl font-bold tracking-tight text-emerald-700 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                教員用モード
            </h2>
            <a href="index.html" class="text-xs text-emerald-600 hover:text-emerald-800 mt-2 inline-block">← トップへ戻る</a>
        </div>
        
        <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="nav-syllabus">
            <div class="text-xs font-semibold text-emerald-500 uppercase tracking-wider mb-3 mt-4">Step 1: Python基礎</div>
            <a href="?week=week01" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-700" data-week="week01">W1: 変数とデータ型 (指導案)</a>
            <a href="?week=week03" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-700" data-week="week03">W3: 条件分岐とインデント (指導案)</a>
            
            <div class="text-xs font-semibold text-emerald-500 uppercase tracking-wider mb-3 mt-6">Step 2: SQL基礎</div>
            <a href="?week=week09" class="week-link block px-3 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:bg-emerald-50 hover:text-emerald-700" data-week="week09">W9: 全てのデータを表示 (指導案)</a>
        </nav>
        
        <div class="p-4 border-t border-emerald-100 flex items-center bg-emerald-50">
            <div class="w-8 h-8 rounded-full bg-emerald-200 flex items-center justify-center text-emerald-700 font-bold text-sm">教</div>
            <span class="ml-3 text-sm font-medium text-emerald-800">インストラクター</span>
        </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 bg-slate-50 overflow-y-auto w-full relative">
        <!-- 背景パターン（オプショナル） -->
        <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\'20\' height=\'20\' viewBox=\'0 0 20 20\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'%23f1f5f9\' fill-opacity=\'0.4\' fill-rule=\'evenodd\'%3E%3Ccircle cx=\'3\' cy=\'3\' r=\'3\'/%3E%3Ccircle cx=\'13\' cy=\'13\' r=\'3\'/%3E%3C/g%3E%3C/svg%3E')] opacity-50 pointer-events-none"></div>

        <header class="bg-white border-b border-emerald-200 p-4 flex justify-between items-center md:hidden sticky top-0 z-20">
            <h1 class="font-bold text-emerald-600">教員用ガイド</h1>
            <a href="index.html" class="text-sm text-slate-500">トップへ</a>
        </header>

        <div class="max-w-4xl mx-auto py-10 px-4 sm:px-6 lg:px-8 relative z-10">
            <!-- 教員用アラート -->
            <div class="mb-6 bg-emerald-100 border-l-4 border-emerald-500 text-emerald-800 p-4 rounded shadow-sm flex items-start">
                <svg class="w-6 h-6 mr-3 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <div>
                    <h3 class="font-bold">インストラクターの皆様へ</h3>
                    <p class="text-sm mt-1">このページは教員用「虎の巻」です。生徒にはこの画面を見せないようにしてください。</p>
                </div>
            </div>

            <div class="bg-white shadow-xl ring-1 ring-emerald-100 sm:rounded-2xl px-6 py-8 sm:p-10 border-t-8 border-emerald-500">
                <article id="content-area" class="prose prose-slate prose-emerald max-w-none
                    prose-headings:font-bold prose-headings:tracking-tight 
                    prose-h1:text-3xl prose-h1:text-emerald-800
                    prose-h2:text-2xl prose-h2:border-b-2 prose-h2:border-emerald-100 prose-h2:pb-2 prose-h2:mt-10
                    prose-h3:text-emerald-700
                    prose-a:text-emerald-600 prose-a:no-underline hover:prose-a:underline
                    prose-pre:bg-slate-800 prose-pre:rounded-lg
                    prose-code:text-emerald-600 prose-code:bg-emerald-50 prose-code:px-1 prose-code:rounded
                    prose-blockquote:border-l-4 prose-blockquote:border-orange-400 prose-blockquote:bg-orange-50/50 prose-blockquote:py-1 prose-blockquote:px-4 prose-blockquote:font-normal prose-blockquote:not-italic
                ">
                    <!-- レンダリング先 -->
                </article>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const week = getCurrentWeek();
            // 教員用のMarkdownを読み込み
            loadMarkdown(`content/teacher/${week}.md`, 'content-area');

            // アクティブリンクのスタイリング
            document.querySelectorAll('.week-link').forEach(link => {
                if(link.getAttribute('data-week') === week) {
                    link.classList.add('bg-emerald-100', 'text-emerald-800', 'font-semibold', 'border-l-4', 'border-emerald-500');
                    link.classList.remove('text-slate-600');
                }
            });
        });
    </script>
</body>
</html>
